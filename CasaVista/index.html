<!DOCTYPE html>
<html>
<head>
<title>CasaVista</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fa;
}

/* NAVBAR 1 */

.topbar{
background:#031a4d;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:42px;
font-weight:bold;
}

.logo span{
color:#2e8fff;
}

.right{
display:flex;
align-items:center;
gap:20px;
}

.post{
background:#1e6cff;
color:white;
border:none;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.profile{
width:55px;
height:55px;
background:gold;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:#031a4d;
font-weight:bold;
}

/* NAVBAR 2 */

.menu{
background:white;
padding:18px;
display:flex;
justify-content:center;
gap:50px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.menu a{
text-decoration:none;
color:black;
}

/* HERO */

.hero{

background:url("images/2.jpg");

background-size:cover;
background-position:center;

padding:120px 20px;
text-align:center;
color:white;
}

.hero h1{
font-size:65px;
margin:0;
}

.hero p{
font-size:30px;
}

/* SEARCH */

.searchbox{

margin:auto;
background:white;
width:65%;
padding:15px;
border-radius:50px;
display:flex;
}

.searchbox input{

flex:1;
border:none;
font-size:22px;
outline:none;
padding-left:20px;

}

.searchbox button{

background:#032a78;
color:white;
border:none;
padding:18px 50px;
border-radius:40px;
font-size:20px;

}

/* sections */

.section{
padding:30px;
}

.section h2{
color:#031a4d;
}

.cards{
display:flex;
gap:25px;
}

.card{
background:white;
width:350px;
border-radius:15px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.price{
color:#1e6cff;
font-size:28px;
font-weight:bold;
}

@media(max-width:768px){

.top-navbar{
padding:10px;
}

.logo{
font-size:32px;
}

.post-btn{
padding:8px 14px;
font-size:12px;
}

.second-navbar{
display:flex;
overflow-x:auto;
gap:20px;
padding:12px;
white-space:nowrap;
}

.hero h1{
font-size:42px;
text-align:center;
}

.hero p{
font-size:22px;
}

.search-box{
width:90%;
height:60px;
display:flex;
}

.search-box input{
width:65%;
font-size:16px;
}

.search-btn{
width:35%;
font-size:18px;
}

.cards{
display:flex;
flex-direction:column;
align-items:center;
}

.card{
width:90%;
margin-bottom:20px;
}

.card img{
height:220px;
}
}

</style>
</head>

<body>


<div class="topbar">

<div class="logo">
Casa<span>Vista</span>
</div>

<div class="right">

<button class="post">
Post Property FREE
</button>

<div class="profile">
👤
</div>

</div>

</div>


<div class="menu">

<a href="">Buy ▼</a>
<a href="">Sell ▼</a>
<a href="">Rent ▼</a>
<a href="">Construction Services ▼</a>
<a href="">Home Loans ▼</a>
<a href="">CV Prime ▼</a>

</div>


<div class="hero">

<h1>Find Your Dream Property</h1>

<p>Buy • Rent • Sell with CasaVista</p>

<div class="searchbox">

<input placeholder="Search project, locality, builder">

<button>
Search
</button>

</div>

</div>



<div class="section">

<h2>Top Picks</h2>

<div class="cards">

<div class="card">

<img src="images/apartment1.jpg">

<div class="info">

<h3>Luxury Residency</h3>

<p>Hyderabad • 3BHK • 1650 sqft</p>

<div class="price">
₹1.20 Cr
</div>

</div>

</div>


<div class="card">

<img src="images/apartment2.jpg">

<div class="info">

<h3>Premium Flats</h3>

<p>Medchal • 2BHK • 1250 sqft</p>

<div class="price">
₹90 Lakh
</div>

</div>

</div>

</div>

</div>

</body>
</html>
